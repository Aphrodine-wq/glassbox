name: "Glassbox Governance Report"
description: "Report governance decisions to a Glassbox server for audit and observability."
author: "glassbox"

inputs:
  glassbox-url:
    description: "Base URL of the Glassbox ingest server (e.g. https://glassbox.example.com)."
    required: true
  api-key:
    description: "API key for authenticating with the Glassbox server."
    required: true
  agent-name:
    description: "Name of the agent reporting the decision."
    required: false
    default: "github-actions"
  mode:
    description: "Governance mode: 'enforce' (block on refusal) or 'shadow' (report only)."
    required: false
    default: "enforce"
  action:
    description: "The action string to govern (e.g. 'deploy production'). If omitted, defaults to the workflow context."
    required: false
    default: ""
  target:
    description: "What the action acts on (e.g. 'production', 'staging'). Defaults to the repository name."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Report to Glassbox
      shell: bash
      env:
        GLASSBOX_URL: ${{ inputs.glassbox-url }}
        GLASSBOX_API_KEY: ${{ inputs.api-key }}
        GLASSBOX_AGENT: ${{ inputs.agent-name }}
        GLASSBOX_MODE: ${{ inputs.mode }}
        GLASSBOX_ACTION: ${{ inputs.action }}
        GLASSBOX_TARGET: ${{ inputs.target }}
      run: bash "${{ github.action_path }}/report.sh"
